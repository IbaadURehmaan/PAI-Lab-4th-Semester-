<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Eye Monitor | Project</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #050914;
            color: #00f3ff;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image:
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .hud-container {
            display: flex;
            gap: 40px;
            background: rgba(10, 15, 30, 0.85);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid rgba(0, 243, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.1), inset 0 0 20px rgba(0, 243, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        .side-panel {
            width: 320px;
            display: flex;
            flex-direction: column;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 36px;
            margin: 0 0 5px 0;
            color: #fff;
            text-shadow: 0 0 10px #00f3ff;
            letter-spacing: 2px;
        }

        .subtitle {
            color: #8892b0;
            font-size: 16px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .status-box {
            background: rgba(0, 243, 255, 0.05);
            border-left: 4px solid #00f3ff;
            padding: 15px;
            margin-bottom: 25px;
        }

        .status-box p {
            margin: 5px 0;
            font-size: 18px;
            color: #e6f1ff;
        }

        .highlight {
            color: #00f3ff;
            font-weight: bold;
        }

        .dev-tag {
            margin-top: auto;
            border-top: 1px dashed rgba(0, 243, 255, 0.3);
            padding-top: 20px;
        }

        .dev-tag h3 {
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            margin: 0 0 5px 0;
            letter-spacing: 1px;
        }

        .dev-tag span {
            color: #ff0055;
            text-transform: uppercase;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(255, 0, 85, 0.5);
        }

        .camera-frame {
            position: relative;
            padding: 10px;
            background: #000;
            border-radius: 8px;
            border: 2px solid #00f3ff;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
        }

        /* Cool Sci-Fi Corner Accents for the Camera */
        .camera-frame::before,
        .camera-frame::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            border: 3px solid #00f3ff;
        }

        .camera-frame::before {
            top: -5px;
            left: -5px;
            border-right: none;
            border-bottom: none;
        }

        .camera-frame::after {
            bottom: -5px;
            right: -5px;
            border-left: none;
            border-top: none;
        }

        img {
            display: block;
            border-radius: 4px;
            opacity: 0.95;
        }
    </style>
</head>

<body>

    <div class="hud-container">

        <div class="side-panel">
            <div>
                <h1>OCULAR.AI</h1>
                <div class="subtitle">BIOMETRIC STRAIN MONITOR</div>

                <div class="status-box">
                    <p>SYSTEM: <span class="highlight">ONLINE</span></p>
                    <p>THREAD: <span class="highlight">BACKGROUND</span></p>
                    <p>ENGINE: <span class="highlight">OPENCV HAAR</span></p>
                </div>

                <p style="color: #8892b0; line-height: 1.5; font-size: 15px;">
                    <strong>SMART LOGIC ENABLED:</strong><br><br>
                    • If you turn away, blinks reset to 0.<br>
                    • If you stare for more than 7 seconds without blinking, a visual alarm will trigger to protect eye
                    moisture.
                </p>
            </div>

            <div class="dev-tag">
                <h3>IBAD U REHMAN</h3>
                <span></span>
            </div>
        </div>

        <div class="camera-frame">
            <img src="{{ url_for('video_feed') }}" width="640" height="480" alt="INITIALIZING NEURAL LINK...">
        </div>

    </div>

</body>

</html>
