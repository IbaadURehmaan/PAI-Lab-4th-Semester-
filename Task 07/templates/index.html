<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AI Knowledge | Useless Facts Engine</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%;
            animation: moveGradient 10s infinite alternate;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        @keyframes moveGradient {
            0% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 100% 50%;
            }
        }

        .main-container {
            width: 900px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 60px;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header h1 {
            font-family: 'Orbitron';
            color: #00d4ff;
            font-size: 3rem;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }

        .header p {
            color: #94a3b8;
            font-size: 1.2rem;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .fact-box {
            width: 100%;
            min-height: 180px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            border-left: 8px solid #00d4ff;
            padding: 35px;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fact-text {
            font-size: 1.6rem;
            font-weight: 500;
            line-height: 1.4;
            color: #e2e8f0;
        }

        .action-btn {
            padding: 20px 50px;
            border-radius: 50px;
            border: none;
            font-family: 'Orbitron';
            background: transparent;
            color: #00d4ff;
            border: 2px solid #00d4ff;
            font-weight: 700;
            cursor: pointer;
            transition: 0.4s;
            letter-spacing: 2px;
        }

        .action-btn:hover {
            background: #00d4ff;
            color: #0f0c29;
            box-shadow: 0 0 40px #00d4ff;
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    <div class="main-container">
        <div class="header" style="text-align: center;">
            <h1>USELESS INFO😂🤦‍♂️</h1>
            <p>Knowledge Representation & API Integration</p>
        </div>

        <div class="fact-box">
            {% if info %}
            <p class="fact-text">"{{ info.text }}"</p>
            {% else %}
            <p class="fact-text" style="opacity: 0.4;">System is ready. Click below to fetch data</p>
            {% endif %}
        </div>

        <form method="POST">
            <button type="submit" class="action-btn">GENERATE NEW USELESS FACT</button>
        </form>
    </div>

    <footer
        style="position: fixed; bottom: 10px; left: 0; width: 100%; text-align: center; color: #00d4ff; opacity: 0.7; font-family: 'Orbitron', sans-serif; font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase; z-index: 100;">
        <p style="margin: 0;">Developed by Ibad U Rehman</p>
    </footer>
</body>

</html>
