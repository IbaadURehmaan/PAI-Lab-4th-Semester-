<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e9ecef;
            text-align: center;
            margin-top: 100px;
        }

        .container {
            background-color: white;
            width: 50%;
            margin: auto;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 30px;
        }

        .setup {
            color: #555;
            font-size: 22px;
        }

        .punchline {
            color: #007BFF;
            font-size: 26px;
            font-weight: bold;
            margin-top: 20px;
        }

        .refresh-btn {
            background-color: #28a745;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 6px;
            font-size: 16px;
            display: inline-block;
            margin-top: 30px;
            cursor: pointer;
        }

        .refresh-btn:hover {
            background-color: #218838;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Daily Random Joke</h1>

        <!-- Jinja tags to display the variables sent from Flask -->
        <p class="setup">{{ setup }}</p>
        <p class="punchline">{{ punchline }}</p>

        <!-- Button to reload the page and fetch a new joke -->
        <a href="/" class="refresh-btn">Get Another Joke</a>
    </div>

</body>

</html>
